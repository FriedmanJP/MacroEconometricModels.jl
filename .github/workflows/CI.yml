name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
    paths-ignore: ['docs/**', '**.md', '.claude/**']
  pull_request:
    paths-ignore: ['docs/**', '**.md', '.claude/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'lts'    # Long-term support (1.10)
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - version: 'lts'
            os: macos-latest
            arch: arm64
          # Coverage cell (T007): current stable Julia owns coverage + Codecov upload.
          # 1.12's coverage machinery is cheaper than 1.10's and keeps coverage off the
          # LTS critical path (one extra free parallel runner). LTS (1.10) still tested on
          # all three OSes for dual-major Optim = "1, 2" compatibility.
          - version: '1'
            os: ubuntu-latest
            arch: x64
          # Optim v1 dual-major compat cell (T153/#252): the declared Optim = "1, 2" compat is
          # otherwise never exercised on the v1 major (default cells resolve v2). Runs Julia 1.10
          # (== lts) but as a distinct matrix string, so it is a separate cell that pins Optim@1.
          - version: '1.10'
            os: ubuntu-latest
            arch: x64
            optim_v1: true

    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v3

      # Optim v1 dual-major compat cell (T153/#252): pin Optim to the v1 major before
      # instantiate/precompile so the suite runs against Optim v1 (default cells resolve v2).
      - name: Pin Optim to the v1 major
        if: matrix.optim_v1
        run: julia --project=. -e 'using Pkg; Pkg.add(Pkg.PackageSpec(name="Optim", version="1"))'

      - uses: julia-actions/julia-buildpkg@v1

      # Robustness trade-off: windows/macOS run as reduced-sampling (fewer draws/reps)
      # cross-platform smoke tests; ubuntu stays the full-fidelity reference (full
      # sampling + coverage). ubuntu must NEVER set FAST or coverage of high-sampling
      # branches could drop. '0' is equivalent to unset (FAST const treats only "1" as true).
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: ${{ matrix.os == 'ubuntu-latest' && matrix.version == '1' }}
        env:
          JULIA_NUM_THREADS: 1
          OPENBLAS_NUM_THREADS: "1"
          MACRO_MULTIPROCESS_TESTS: "1"
          MACRO_FAST_TESTS: ${{ matrix.os == 'ubuntu-latest' && '0' || '1' }}
          # Restore standard Pkg.test bounds-checking on the full-fidelity ubuntu job only (#126).
          MACRO_CHECK_BOUNDS: ${{ matrix.os == 'ubuntu-latest' && '1' || '0' }}

      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'

      - uses: codecov/codecov-action@v7
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        with:
          files: lcov.info
          slug: FriedmanJP/MacroEconometricModels.jl
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # RNG-everywhere lint (#243): every drawing function must thread an rng; no bare
  # rand/randn on the global RNG in src/. Dependency-free (no Julia), so it runs fast.
  rng-lint:
    name: RNG-everywhere lint (#243)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Ban bare rand/randn on the global RNG in src/
        run: |
          # Docstring-aware: skips content inside """...""" blocks and # comment lines, so
          # docstring `# Examples` (randn(n), randn(200,3), rand(1:k), …) are not flagged.
          # Whitelist on real-code lines: rng-threaded draws (rand(rng,…)/randn(local_rng,…)/
          # any *_rng local), MersenneTwister/Random.default_rng seeds, and an explicit
          # `# rng-lint: ignore` opt-out. Everything else drawing bare on the global RNG fails.
          viol=$(awk '
            FNR==1 { indoc=0 }
            {
              tmp=$0; c=gsub(/"""/,"",tmp); startin=indoc
              k=c; while (k-- > 0) indoc=!indoc
              if (startin || (c % 2 == 1)) next
              if ($0 ~ /^[[:space:]]*#/) next
              if ($0 !~ /(^|[^A-Za-z_.])(rand|randn|randn!)\(/) next
              line=$0
              if (line ~ /\((rng|local_rng|thread_rng|rep_rng|rng_actual|rng_draw|boot_rng|thread_local_rng)[,)]/) next
              if (line ~ /(MersenneTwister|Random\.default_rng|rand\(UInt)/) next
              if (line ~ /# *rng-lint: *ignore/) next
              printf("%s:%d:%s\n", FILENAME, FNR, $0)
            }
          ' $(find src -name "*.jl" | sort))
          if [ -n "$viol" ]; then
            echo "::error::Bare rand/randn drawing on the global RNG (see #243 rng-everywhere policy):"
            echo "$viol"
            exit 1
          fi
          echo "rng-lint OK — no bare rand/randn in src/"
