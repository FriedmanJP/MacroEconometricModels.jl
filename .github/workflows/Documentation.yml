name: Documentation

on:
  push:
    branches:
      - main
      - dev            # build + verify on every dev push; deploy stays main/tags-only
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  build:
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Threaded example blocks (pvar bootstrap) parallelize on the runner's 4 vCPUs,
      # and verify_examples.jl needs >=2 threads for its per-block timeout watchdog.
      JULIA_NUM_THREADS: "4"
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: 'lts'
      - uses: julia-actions/cache@v3
      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
      # Enforcement backstop (T011): execute every page's @setup/@example blocks —
      # including the show/display path — with per-block attribution. A non-zero exit
      # (any example failure) fails the job before deploy. No continue-on-error.
      - name: Verify documentation examples
        run: julia --project=docs docs/verify_examples.jl --all
        env:
          # Hosted runners are ~2x slower than local; 240 s still backstops real hangs
          # (heaviest legitimate blocks: pvar.md bootstrap, tests_unitroot_advanced.md grid searches).
          DOCS_VERIFY_TIMEOUT: "240"
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using MacroEconometricModels
          DocMeta.setdocmeta!(MacroEconometricModels, :DocTestSetup, :(using MacroEconometricModels); recursive=true)
          doctest(MacroEconometricModels)
