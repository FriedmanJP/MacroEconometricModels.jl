# Denmark — Johansen & Juselius (1990) Danish money-demand quarterly data,
# 1974:Q1-1987:Q3 (55 obs). Variables: LRM (log real M2 money), LRY (log real
# income), LPY (log price/GDP deflator ratio), IBO (bond interest rate), IDE
# (deposit interest rate). The canonical cointegration money-demand dataset.
# Public domain; distributed with R package `urca` as `denmark` (Pfaff 2008).
# Used by load_example(:denmark) for VECM restriction testing (EV-38, #446).
# Source: Johansen, S. & Juselius, K. (1990), Oxford Bulletin of Economics and
# Statistics 52(2), 169-210.

[metadata]
desc = "Danish money demand, 1974Q1-1987Q3 (Johansen & Juselius 1990)"
frequency = "Quarterly"
n_obs = 55
start_year = 1974
end_year = 1987
source = "Johansen & Juselius (1990), Oxford Bull. Econ. Statist. 52(2), 169-210; distributed with R urca (Pfaff 2008)."
source_refs = ["johansen_juselius1990"]

[variables]
names = ["LRM", "LRY", "LPY", "IBO", "IDE"]
tcodes = [1, 1, 1, 1, 1]

[descriptions]
LRM = "Log real money stock M2, Denmark"
LRY = "Log real income (GDP)"
LPY = "Log price level (implicit GDP deflator ratio)"
IBO = "Bond interest rate (10-year government bond yield)"
IDE = "Deposit interest rate"

