# Hamilton (1989) US real GNP growth — the canonical Markov-switching AR dataset.
#
# 100 × the quarterly log-difference of seasonally-adjusted US real GNP,
# 1951Q2–1984Q4 (135 observations). This is the series used in Hamilton (1989,
# Econometrica 57(2)) to fit the MS(2)-AR(4) business-cycle model; regime 1 is the
# high-growth expansion (μ̂ ≈ 1.16), regime 2 the low-growth recession
# (μ̂ ≈ −0.36), with staying probabilities p₁₁ ≈ 0.90, p₂₂ ≈ 0.75.
#
# Values are the `rgnp` series distributed with Hamilton's replication files and
# bundled verbatim in statsmodels' regime-switching test data
# (statsmodels.tsa.regime_switching.tests.test_markov_autoregression.rgnp,
# statsmodels 0.14.4). Used by load_example(:gnp_hamilton); EV-07 (#415).
# Source: Hamilton, J. D. (1989). "A New Approach to the Economic Analysis of
# Nonstationary Time Series and the Business Cycle." Econometrica 57(2), 357–384.

[metadata]
desc = "Hamilton (1989) US real GNP growth, 1951Q2-1984Q4 (100 x quarterly log-diff)"
frequency = "Quarterly"
n_obs = 135
start_year = 1951
source = "Hamilton (1989), Econometrica 57(2), 357-384; rgnp replication series"
source_refs = ["hamilton1989"]

[variables]
names = ["gnp_growth"]
tcodes = [1]

[descriptions]
gnp_growth = "100 x quarterly log-difference of seasonally-adjusted US real GNP, 1951Q2-1984Q4"

