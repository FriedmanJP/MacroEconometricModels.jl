# base R as `datasets::Nile`. Used by load_example(:nile); shared by EV-13 (ARFIMA)
# and EV-37 (state-space local level, Durbin & Koopman 2012 σ̂²_ε≈15099, σ̂²_η≈1469.1).
# Source: Cobb (1978); Durbin & Koopman (2012), Time Series Analysis by State Space
# Methods, 2nd ed., §2.

